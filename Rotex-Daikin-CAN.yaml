########################### CAN Nachrichten abfragen #################################################
interval:
  - interval: ${interval_time}
    then:
      if:
        condition:
          - lambda: "return id(interval_active);"
        then:
          - lambda: |-
              sendRequest(id(can_bus));

canbus:
  - platform: esp32_can
    id: can_bus
    can_id: 0x680
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    bit_rate: 20kbps

    on_frame:
      - can_id: 0 # listen to all messages
        can_id_mask: 0
        then:
          - lambda: "data_requests.handle(id(can_bus), can_id, x);"

time:
  - platform: sntp
    on_time:
      - seconds: /1
        then:
          - lambda: "sendRequest(id(can_bus));"
